name: Feature request
description: Suggest a product or platform improvement
title: "[Feature]: "
labels:
  - feature
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - portal
        - backoffice
        - worker
        - modules
        - database
        - platform
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should we build?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how?
