name: Bug report
description: Report a defect in product or platform behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - portal
        - backoffice
        - worker
        - modules
        - database
        - platform
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected right now?
  - type: textarea
    id: rollback
    attributes:
      label: Workaround or rollback
      description: Temporary mitigation, if known
